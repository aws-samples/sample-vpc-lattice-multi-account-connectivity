# =============================================================
# Squid Proxy - Production Configuration
# Centralized egress for VPC Lattice workloads
# Based on: https://github.com/aws-samples/centralised-egress-proxy
# =============================================================

# Domain allowlist - update allowlist.txt to manage permitted domains
acl whitelist dstdomain "/etc/squid/allowlist.txt"
http_access allow whitelist
http_access deny all

# Network ACLs
acl all src all
acl manager proto cache_object
acl localhost src 127.0.0.1/32
acl to_localhost dst 127.0.0.0/8 0.0.0.0/32

acl localnet src 10.0.0.0/8       # RFC1918
acl localnet src 172.16.0.0/12    # RFC1918
acl localnet src 192.168.0.0/16   # RFC1918
acl localnet src fc00::/7          # RFC4193 local private network
acl localnet src fe80::/10         # RFC4291 link-local

# Port ACLs
acl SSL_ports port 443
acl Safe_ports port 80             # HTTP
acl Safe_ports port 443            # HTTPS
acl Safe_ports port 1025-65535     # Unregistered ports
acl CONNECT method CONNECT

# Logging
acl hasRequest has request
access_log stdio:/dev/stdout hasRequest
pid_filename /tmp/squid.pid

# Access rules (order matters)
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost manager
http_access deny manager
http_access deny all

# Listen on port 3128
http_port 3128

# Security hardening
forwarded_for delete
via off
httpd_suppress_version_string on

# Performance
coredump_dir /var/spool/squid
refresh_pattern ^ftp:       1440  20%  10080
refresh_pattern ^gopher:    1440  0%   1440
refresh_pattern -i (/cgi-bin/|\?) 0  0%  0
refresh_pattern .           0     20%  4320

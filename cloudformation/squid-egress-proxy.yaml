AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Centralized Squid forward proxy on ECS Fargate behind an internal Network Load
  Balancer, exposed to all three VPC Lattice service networks (dev/test/prod) via
  an egress Resource Gateway and the squid-proxy-rc Resource Configuration.
  CloudFormation equivalent of the CDK SquidEgressStack. Deployed to the Network
  account, into the Egress VPC. VPC/subnet IDs are resolved from SSM parameters.
  Traffic path: Workload VPC -> Lattice -> Egress Resource Gateway -> NLB :3128 ->
  Squid (FQDN allowlist) -> NAT Gateway -> Internet.

# ============================================================
# Metadata - parameter grouping for console deployment
# ============================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Egress VPC (from SSM parameters)
        Parameters:
          - EgressVpcId
          - EgressVpcCidr
          - EgressSubnetAId
          - EgressSubnetBId
          - LatticePrefixListId
      - Label:
          default: Service Networks (from core stack outputs)
        Parameters:
          - DevServiceNetworkId
          - TestServiceNetworkId
          - ProdServiceNetworkId
      - Label:
          default: Squid proxy configuration
        Parameters:
          - ProxyImage
          - AllowedDomains
          - DesiredCount
          - TaskCpu
          - TaskMemory

# ============================================================
# Parameters
# ============================================================
Parameters:
  EgressVpcId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Default: /netfabric/network/egress-vpc/id
    Description: SSM parameter path for the Egress VPC ID

  EgressVpcCidr:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/egress-vpc/cidr/ipv4
    Description: SSM parameter path for the Egress VPC IPv4 CIDR (used for NLB health-check ingress)

  EgressSubnetAId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/network/egress-vpc/subnet/a/id
    Description: SSM parameter path for Egress subnet A (AZ a)

  EgressSubnetBId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/network/egress-vpc/subnet/b/id
    Description: SSM parameter path for Egress subnet B (AZ b)

  LatticePrefixListId:
    Type: String
    Description: VPC Lattice managed prefix list ID (com.amazonaws.<region>.vpc-lattice)
    AllowedPattern: '^pl-[a-z0-9]+$'

  DevServiceNetworkId:
    Type: String
    Description: Dev service network ID from the core stack (e.g. sn-EXAMPLEdev0000000)
    AllowedPattern: '^sn-[0-9a-z]{17}$'

  TestServiceNetworkId:
    Type: String
    Description: Test service network ID from the core stack
    AllowedPattern: '^sn-[0-9a-z]{17}$'

  ProdServiceNetworkId:
    Type: String
    Description: Prod service network ID from the core stack
    AllowedPattern: '^sn-[0-9a-z]{17}$'

  ProxyImage:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/egress/squid-image-uri
    Description: >
      SSM parameter path holding the Squid container image URI. Populated
      automatically by the squid-image-build stack after a successful CodeBuild
      run. Deploy squid-image-build.yaml and trigger the build before deploying
      this stack.

  AllowedDomains:
    Type: String
    Description: >
      Space-separated FQDN allowlist passed to the container as the ALLOWED_DOMAINS
      environment variable. Squid denies any domain not on this list. Non-sensitive
      configuration (no secrets), e.g. "aws.amazon.com .ubuntu.com .pypi.org".

  DesiredCount:
    Type: Number
    Default: 3
    MinValue: 1
    Description: Number of Fargate tasks. Defaults to one per AZ (3) so each AZ has a local Squid target, which avoids cross-AZ data transfer and matches the one-NAT-per-AZ posture.

  TaskCpu:
    Type: String
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: Fargate task CPU units

  TaskMemory:
    Type: String
    Default: '1024'
    Description: Fargate task memory (MiB); must be valid for the chosen CPU

# ============================================================
# Resources
# ============================================================
Resources:

  # ------------------------------------------------------------
  # KMS key for CloudWatch Logs encryption at rest
  # ------------------------------------------------------------
  LogsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK for the Squid egress proxy CloudWatch log group
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAdmin
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                'kms:EncryptionContext:aws:logs:arn': !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'

  # ------------------------------------------------------------
  # Security groups (explicit, least-privilege)
  #   - Ingress on 3128 only from the VPC Lattice managed prefix list
  #     and the Egress VPC CIDR (for NLB health checks).
  #   - No 0.0.0.0/0 ingress on any port.
  # ------------------------------------------------------------
  ProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Squid proxy Fargate tasks - ${AWS::StackName}'
      VpcId: !Ref EgressVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3128
          ToPort: 3128
          SourcePrefixListId: !Ref LatticePrefixListId
          Description: Proxy traffic from VPC Lattice
        - IpProtocol: tcp
          FromPort: 3128
          ToPort: 3128
          CidrIp: !Ref EgressVpcCidr
          Description: NLB health checks from within the Egress VPC
      SecurityGroupEgress:
        # Intentional: a forward proxy must reach arbitrary internet destinations.
        # Destination filtering is enforced by the Squid FQDN allowlist, not the SG.
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS egress to the internet (filtered by Squid allowlist)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP egress to the internet (filtered by Squid allowlist)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-proxy-sg'

  ResourceGatewaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Egress Lattice resource gateway - ${AWS::StackName}'
      VpcId: !Ref EgressVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3128
          ToPort: 3128
          SourcePrefixListId: !Ref LatticePrefixListId
          Description: Proxy traffic from VPC Lattice
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3128
          ToPort: 3128
          CidrIp: !Ref EgressVpcCidr
          Description: Forward to the internal NLB within the Egress VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-rg-sg'

  # ------------------------------------------------------------
  # IAM roles
  # ------------------------------------------------------------
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-execution-role'

  ECSTaskExecPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: ECS Exec (EnableExecuteCommand) channel permissions for the Squid task role
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # ECS Exec (EnableExecuteCommand) requires ssmmessages:* with a wildcard
          # resource per AWS documentation. Scoped to the task role only.
          - Effect: Allow
            Action:
              - ssmmessages:CreateControlChannel
              - ssmmessages:CreateDataChannel
              - ssmmessages:OpenControlChannel
              - ssmmessages:OpenDataChannel
            Resource: '*'

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref ECSTaskExecPolicy
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-task-role'

  # ------------------------------------------------------------
  # ECS cluster, logs, task definition, service
  # ------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: netfabric-squid-egress-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: netfabric-squid-egress-cluster

  ProxyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/netfabric-squid-egress-proxy
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Name
          Value: netfabric-squid-egress-proxy-logs

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: netfabric-squid-egress-proxy
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: squid
          Image: !Ref ProxyImage
          Essential: true
          # ALLOWED_DOMAINS is a non-sensitive public FQDN allowlist (no secrets/credentials),
          # so a plain environment variable is appropriate. For a large or frequently changing
          # list, source it from SSM Parameter Store and read it at container start instead.
          Environment:
            - Name: ALLOWED_DOMAINS
              Value: !Ref AllowedDomains
          PortMappings:
            - ContainerPort: 3128
              HostPort: 3128
              Protocol: tcp
          # Enable ECS Exec (interactive shell into a running task for troubleshooting)
          LinuxParameters:
            InitProcessEnabled: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ProxyLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: squid
          HealthCheck:
            Command:
              - CMD-SHELL
              - "bash -c 'echo > /dev/tcp/127.0.0.1/3128' || exit 1"
            Interval: 30
            Retries: 3
            Timeout: 5

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: NLBListener
    Properties:
      ServiceName: netfabric-squid-egress-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: true
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ProxySecurityGroup
          Subnets:
            - !Ref EgressSubnetAId
            - !Ref EgressSubnetBId
      LoadBalancers:
        - ContainerName: squid
          ContainerPort: 3128
          TargetGroupArn: !Ref TargetGroup
      Tags:
        - Key: Name
          Value: netfabric-squid-egress-service

  # ------------------------------------------------------------
  # Application Auto Scaling (optional, target-tracking on CPU)
  # ------------------------------------------------------------
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 20
      MinCapacity: !Ref DesiredCount
      ResourceId: !Sub 'service/${ECSCluster}/${ECSService.Name}'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScalingPolicyCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 180
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization

  # ------------------------------------------------------------
  # Internal Network Load Balancer (TCP:3128)
  #   Internal only; reachable solely via the egress Resource Gateway.
  #   Observability is provided by VPC Lattice access logs at the service
  #   network level (see the core stack), not NLB S3 access logs.
  # ------------------------------------------------------------
  NLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-nlb'
      Scheme: internal
      Type: network
      Subnets:
        - !Ref EgressSubnetAId
        - !Ref EgressSubnetBId
      LoadBalancerAttributes:
        - Key: load_balancing.cross_zone.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nlb'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      VpcId: !Ref EgressVpcId
      Protocol: TCP
      Port: 3128
      TargetType: ip
      HealthCheckProtocol: TCP
      HealthCheckPort: '3128'
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-tg'

  NLBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref NLB
      Port: 3128
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ------------------------------------------------------------
  # VPC Lattice egress Resource Gateway + Resource Configuration
  # ------------------------------------------------------------
  EgressResourceGateway:
    Type: AWS::VpcLattice::ResourceGateway
    Properties:
      Name: egress-resource-gateway
      VpcIdentifier: !Ref EgressVpcId
      IpAddressType: IPV4
      SubnetIds:
        - !Ref EgressSubnetAId
        - !Ref EgressSubnetBId
      SecurityGroupIds:
        - !Ref ResourceGatewaySecurityGroup
      Tags:
        - Key: Name
          Value: egress-resource-gateway

  SquidProxyResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: squid-proxy-rc
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EgressResourceGateway.Id
      # Stable consumer-facing proxy domain. VPC Lattice provisions a managed
      # Private Hosted Zone for this name in associated workload VPCs, so
      # workloads set HTTP_PROXY/HTTPS_PROXY=http://squid-proxy.egress.internal:3128.
      CustomDomainName: squid-proxy.egress.internal
      AllowAssociationToSharableServiceNetwork: true
      ProtocolType: TCP
      PortRanges:
        - '3128'
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !GetAtt NLB.DNSName
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: squid-proxy-rc

  # Associate squid-proxy-rc with all three service networks. PrivateDnsEnabled
  # triggers managed PHZ creation for squid-proxy.egress.internal in associated
  # workload VPCs.
  SquidRCAssocDev:
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !Ref DevServiceNetworkId
      ResourceConfigurationId: !GetAtt SquidProxyResourceConfig.Id
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: squid-proxy-rc-dev

  SquidRCAssocTest:
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    DependsOn: SquidRCAssocDev
    Properties:
      ServiceNetworkId: !Ref TestServiceNetworkId
      ResourceConfigurationId: !GetAtt SquidProxyResourceConfig.Id
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: squid-proxy-rc-test

  SquidRCAssocProd:
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    DependsOn: SquidRCAssocTest
    Properties:
      ServiceNetworkId: !Ref ProdServiceNetworkId
      ResourceConfigurationId: !GetAtt SquidProxyResourceConfig.Id
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: squid-proxy-rc-prod

# ============================================================
# Outputs
# ============================================================
Outputs:
  NlbDnsName:
    Description: Internal NLB DNS name (RC target)
    Value: !GetAtt NLB.DNSName
  ClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster
  ServiceName:
    Description: ECS service name
    Value: !GetAtt ECSService.Name
  EgressResourceGatewayId:
    Description: Egress Resource Gateway ID
    Value: !GetAtt EgressResourceGateway.Id
  SquidProxyRcId:
    Description: squid-proxy-rc Resource Configuration ID
    Value: !GetAtt SquidProxyResourceConfig.Id
  ProxySecurityGroupId:
    Description: Squid proxy security group ID
    Value: !Ref ProxySecurityGroup

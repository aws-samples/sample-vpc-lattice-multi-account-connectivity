AWSTemplateFormatVersion: '2010-09-09'
Description: >
  VPC Lattice Service Networks, Resource Gateways, Resource Configurations,
  and RAM shares to workload accounts. Deployed to the Network account.
  All VPC/subnet/SG IDs are resolved dynamically from SSM parameters.
  VPCE DNS names are resolved dynamically via Lambda custom resource.

Parameters:
  EndpointVpcId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Default: /netfabric/network/endpoint-vpc/id
    Description: SSM parameter path for the Endpoint VPC ID
  EndpointSubnetAId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/network/endpoint-vpc/subnet/a/id
    Description: SSM parameter path for the Endpoint VPC subnet A ID
  EndpointSubnetBId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/network/endpoint-vpc/subnet/b/id
    Description: SSM parameter path for the Endpoint VPC subnet B ID
  EndpointSecurityGroupId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::SecurityGroup::Id>
    Default: /netfabric/network/endpoint-vpc/sg/rg/id
    Description: SSM parameter path for the Resource Gateway security group ID
  OrgId:
    Type: String
    Description: AWS Organizations ID (e.g., o-EXAMPLE12345)
  DevOuArn:
    Type: String
    Description: ARN of the Dev OU (the OU containing all dev workload accounts)
  DevOuPath:
    Type: String
    Description: >
      Org path for the Dev OU, e.g.
      o-EXAMPLE12345/r-EXAM/ou-EXAMPLE-dev0000.
      Used in IAM auth policy aws:PrincipalOrgPaths conditions.
  TestOuArn:
    Type: String
    Description: ARN of the Test OU
  TestOuPath:
    Type: String
    Description: Org path for the Test OU
  ProdOuArn:
    Type: String
    Description: ARN of the Prod OU
  ProdOuPath:
    Type: String
    Description: Org path for the Prod OU

  # Interface-endpoint DNS names, published to SSM by network-foundation.yaml
  # (from each VPCE's DnsEntries). Read here to set each Resource Configuration's
  # target DomainName natively, so no DNS-discovery Lambda is required.
  SsmVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ssm/dns
    Description: SSM path for the ssm interface endpoint DNS name
  SsmMessagesVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ssmmessages/dns
    Description: SSM path for the ssmmessages interface endpoint DNS name
  Ec2MessagesVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ec2messages/dns
    Description: SSM path for the ec2messages interface endpoint DNS name
  StsVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/sts/dns
    Description: SSM path for the sts interface endpoint DNS name
  EcrApiVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ecr-api/dns
    Description: SSM path for the ecr.api interface endpoint DNS name
  EcrDkrVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ecr-dkr/dns
    Description: SSM path for the ecr.dkr interface endpoint DNS name
  LogsVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/logs/dns
    Description: SSM path for the logs interface endpoint DNS name
  EcsVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ecs/dns
    Description: SSM path for the ecs interface endpoint DNS name
  EcsAgentVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ecs-agent/dns
    Description: SSM path for the ecs-agent interface endpoint DNS name
  EcsTelemetryVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/ecs-telemetry/dns
    Description: SSM path for the ecs-telemetry interface endpoint DNS name
  ExecuteApiVpceDns:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /netfabric/network/endpoint-vpc/vpce/execute-api/dns
    Description: SSM path for the execute-api interface endpoint DNS name

Resources:

  # ============================================================
  # KMS key for CloudWatch Logs encryption at rest
  # ============================================================
  LogsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK for Network fabric service-network access log groups
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAdmin
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                'kms:EncryptionContext:aws:logs:arn': !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'

  # ============================================================
  # Service Networks: one per environment
  # ============================================================
  DevServiceNetwork:
    Type: AWS::VpcLattice::ServiceNetwork
    Properties:
      Name: sn-dev-shared
      AuthType: AWS_IAM
      Tags:
        - Key: Name
          Value: sn-dev-shared
        - Key: Environment
          Value: dev
        - Key: Description
          Value: 'Shared VPC Lattice service network for the dev environment: AWS service endpoint access and centralized egress for dev OU workload VPCs.'

  DevServiceNetworkAuthPolicy:
    Type: AWS::VpcLattice::AuthPolicy
    Properties:
      ResourceIdentifier: !Ref DevServiceNetwork
      Policy:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: vpc-lattice-svcs:Invoke
            Resource: '*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrgId
              ForAnyValue:StringLike:
                aws:PrincipalOrgPaths:
                  - !Sub '${DevOuPath}/*'

  TestServiceNetwork:
    Type: AWS::VpcLattice::ServiceNetwork
    Properties:
      Name: sn-test-shared
      AuthType: AWS_IAM
      Tags:
        - Key: Name
          Value: sn-test-shared
        - Key: Environment
          Value: test
        - Key: Description
          Value: 'Shared VPC Lattice service network for the test environment: AWS service endpoint access and centralized egress for test OU workload VPCs.'

  TestServiceNetworkAuthPolicy:
    Type: AWS::VpcLattice::AuthPolicy
    Properties:
      ResourceIdentifier: !Ref TestServiceNetwork
      Policy:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: vpc-lattice-svcs:Invoke
            Resource: '*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrgId
              ForAnyValue:StringLike:
                aws:PrincipalOrgPaths:
                  - !Sub '${TestOuPath}/*'

  ProdServiceNetwork:
    Type: AWS::VpcLattice::ServiceNetwork
    Properties:
      Name: sn-prod-shared
      AuthType: AWS_IAM
      Tags:
        - Key: Name
          Value: sn-prod-shared
        - Key: Environment
          Value: prod
        - Key: Description
          Value: 'Shared VPC Lattice service network for the prod environment: AWS service endpoint access and centralized egress for prod OU workload VPCs.'

  ProdServiceNetworkAuthPolicy:
    Type: AWS::VpcLattice::AuthPolicy
    Properties:
      ResourceIdentifier: !Ref ProdServiceNetwork
      Policy:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: vpc-lattice-svcs:Invoke
            Resource: '*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrgId
              ForAnyValue:StringLike:
                aws:PrincipalOrgPaths:
                  - !Sub '${ProdOuPath}/*'

  # ============================================================
  # Service Network access logging (VPC Lattice access logs)
  # One CloudWatch log group per environment per log type (SERVICE / RESOURCE).
  # These are the authoritative audit trail for endpoint access and the egress
  # chokepoint, and the observability source for the internal egress NLB.
  # ============================================================
  DevServiceAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /lattice/dev/service-access-logs
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Environment
          Value: dev
  DevResourceAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /lattice/dev/resource-access-logs
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Environment
          Value: dev
  DevServiceAccessLogSubscription:
    Type: AWS::VpcLattice::AccessLogSubscription
    Properties:
      ResourceIdentifier: !Ref DevServiceNetwork
      DestinationArn: !GetAtt DevServiceAccessLogGroup.Arn
      ServiceNetworkLogType: SERVICE
  DevResourceAccessLogSubscription:
    Type: AWS::VpcLattice::AccessLogSubscription
    Properties:
      ResourceIdentifier: !Ref DevServiceNetwork
      DestinationArn: !GetAtt DevResourceAccessLogGroup.Arn
      ServiceNetworkLogType: RESOURCE

  TestServiceAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /lattice/test/service-access-logs
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Environment
          Value: test
  TestResourceAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /lattice/test/resource-access-logs
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Environment
          Value: test
  TestServiceAccessLogSubscription:
    Type: AWS::VpcLattice::AccessLogSubscription
    Properties:
      ResourceIdentifier: !Ref TestServiceNetwork
      DestinationArn: !GetAtt TestServiceAccessLogGroup.Arn
      ServiceNetworkLogType: SERVICE
  TestResourceAccessLogSubscription:
    Type: AWS::VpcLattice::AccessLogSubscription
    Properties:
      ResourceIdentifier: !Ref TestServiceNetwork
      DestinationArn: !GetAtt TestResourceAccessLogGroup.Arn
      ServiceNetworkLogType: RESOURCE

  ProdServiceAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /lattice/prod/service-access-logs
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Environment
          Value: prod
  ProdResourceAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /lattice/prod/resource-access-logs
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn
      Tags:
        - Key: Environment
          Value: prod
  ProdServiceAccessLogSubscription:
    Type: AWS::VpcLattice::AccessLogSubscription
    Properties:
      ResourceIdentifier: !Ref ProdServiceNetwork
      DestinationArn: !GetAtt ProdServiceAccessLogGroup.Arn
      ServiceNetworkLogType: SERVICE
  ProdResourceAccessLogSubscription:
    Type: AWS::VpcLattice::AccessLogSubscription
    Properties:
      ResourceIdentifier: !Ref ProdServiceNetwork
      DestinationArn: !GetAtt ProdResourceAccessLogGroup.Arn
      ServiceNetworkLogType: RESOURCE

  # ============================================================
  # Resource Gateways
  # ============================================================
  EndpointResourceGateway:
    Type: AWS::VpcLattice::ResourceGateway
    Properties:
      Name: endpoint-resource-gw
      VpcIdentifier: !Ref EndpointVpcId
      SubnetIds:
        - !Ref EndpointSubnetAId
        - !Ref EndpointSubnetBId
      SecurityGroupIds:
        - !Ref EndpointSecurityGroupId
      IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: endpoint-resource-gw

  # Egress Resource Gateway removed: egress proxy now uses
  # VPC Lattice Service + Target Group (standalone stack)

  # ============================================================
  # RAM Shares
  # ============================================================
  DevRAMShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: vpc-lattice-sn-dev-share
      AllowExternalPrincipals: false
      ResourceArns:
        - !Ref DevServiceNetwork
      Principals:
        - !Ref DevOuArn
      Tags:
        - Key: Name
          Value: vpc-lattice-sn-dev-share

  TestRAMShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: vpc-lattice-sn-test-share
      AllowExternalPrincipals: false
      ResourceArns:
        - !Ref TestServiceNetwork
      Principals:
        - !Ref TestOuArn
      Tags:
        - Key: Name
          Value: vpc-lattice-sn-test-share

  ProdRAMShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: vpc-lattice-sn-prod-share
      AllowExternalPrincipals: false
      ResourceArns:
        - !Ref ProdServiceNetwork
      Principals:
        - !Ref ProdOuArn
      Tags:
        - Key: Name
          Value: vpc-lattice-sn-prod-share

  # ============================================================
  # Resource Configurations: 11 endpoint RCs (the egress proxy RC is defined in squid-egress-proxy.yaml)
  # VPCE DNS names read from SSM (published natively by network-foundation.yaml)
  # ============================================================

  SsmResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ssm-endpoint-rc
      CustomDomainName: !Sub ssm.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref SsmVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ssm-endpoint-rc

  SsmSNAssocDev:
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt SsmResourceConfig.Id
      PrivateDnsEnabled: true
  SsmSNAssocTest:
    DependsOn: SsmSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt SsmResourceConfig.Id
      PrivateDnsEnabled: true
  SsmSNAssocProd:
    DependsOn: SsmSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt SsmResourceConfig.Id
      PrivateDnsEnabled: true

  SsmmessagesResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ssmmessages-endpoint-rc
      CustomDomainName: !Sub ssmmessages.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref SsmMessagesVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ssmmessages-endpoint-rc

  SsmmessagesSNAssocDev:
    DependsOn: SsmSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt SsmmessagesResourceConfig.Id
      PrivateDnsEnabled: true
  SsmmessagesSNAssocTest:
    DependsOn: SsmmessagesSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt SsmmessagesResourceConfig.Id
      PrivateDnsEnabled: true
  SsmmessagesSNAssocProd:
    DependsOn: SsmmessagesSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt SsmmessagesResourceConfig.Id
      PrivateDnsEnabled: true

  Ec2messagesResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ec2messages-endpoint-rc
      CustomDomainName: !Sub ec2messages.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref Ec2MessagesVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ec2messages-endpoint-rc

  Ec2messagesSNAssocDev:
    DependsOn: SsmmessagesSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt Ec2messagesResourceConfig.Id
      PrivateDnsEnabled: true
  Ec2messagesSNAssocTest:
    DependsOn: Ec2messagesSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt Ec2messagesResourceConfig.Id
      PrivateDnsEnabled: true
  Ec2messagesSNAssocProd:
    DependsOn: Ec2messagesSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt Ec2messagesResourceConfig.Id
      PrivateDnsEnabled: true

  StsResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: sts-endpoint-rc
      CustomDomainName: !Sub sts.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref StsVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: sts-endpoint-rc

  StsSNAssocDev:
    DependsOn: Ec2messagesSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt StsResourceConfig.Id
      PrivateDnsEnabled: true
  StsSNAssocTest:
    DependsOn: StsSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt StsResourceConfig.Id
      PrivateDnsEnabled: true
  StsSNAssocProd:
    DependsOn: StsSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt StsResourceConfig.Id
      PrivateDnsEnabled: true

  EcrApiResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ecr-api-endpoint-rc
      CustomDomainName: !Sub api.ecr.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref EcrApiVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ecr-api-endpoint-rc

  EcrApiSNAssocDev:
    DependsOn: StsSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcrApiResourceConfig.Id
      PrivateDnsEnabled: true
  EcrApiSNAssocTest:
    DependsOn: EcrApiSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcrApiResourceConfig.Id
      PrivateDnsEnabled: true
  EcrApiSNAssocProd:
    DependsOn: EcrApiSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcrApiResourceConfig.Id
      PrivateDnsEnabled: true

  EcrDkrResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ecr-dkr-endpoint-rc
      CustomDomainName: !Sub dkr.ecr.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref EcrDkrVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ecr-dkr-endpoint-rc

  EcrDkrSNAssocDev:
    DependsOn: EcrApiSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcrDkrResourceConfig.Id
      PrivateDnsEnabled: true
  EcrDkrSNAssocTest:
    DependsOn: EcrDkrSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcrDkrResourceConfig.Id
      PrivateDnsEnabled: true
  EcrDkrSNAssocProd:
    DependsOn: EcrDkrSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcrDkrResourceConfig.Id
      PrivateDnsEnabled: true

  LogsResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: logs-endpoint-rc
      CustomDomainName: !Sub logs.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref LogsVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: logs-endpoint-rc

  LogsSNAssocDev:
    DependsOn: EcrDkrSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt LogsResourceConfig.Id
      PrivateDnsEnabled: true
  LogsSNAssocTest:
    DependsOn: LogsSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt LogsResourceConfig.Id
      PrivateDnsEnabled: true
  LogsSNAssocProd:
    DependsOn: LogsSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt LogsResourceConfig.Id
      PrivateDnsEnabled: true

  EcsResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ecs-endpoint-rc
      CustomDomainName: !Sub ecs.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref EcsVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ecs-endpoint-rc

  EcsSNAssocDev:
    DependsOn: LogsSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsResourceConfig.Id
      PrivateDnsEnabled: true
  EcsSNAssocTest:
    DependsOn: EcsSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsResourceConfig.Id
      PrivateDnsEnabled: true
  EcsSNAssocProd:
    DependsOn: EcsSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsResourceConfig.Id
      PrivateDnsEnabled: true

  EcsAgentResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ecs-agent-endpoint-rc
      CustomDomainName: !Sub ecs-agent.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref EcsAgentVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ecs-agent-endpoint-rc

  EcsAgentSNAssocDev:
    DependsOn: EcsSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsAgentResourceConfig.Id
      PrivateDnsEnabled: true
  EcsAgentSNAssocTest:
    DependsOn: EcsAgentSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsAgentResourceConfig.Id
      PrivateDnsEnabled: true
  EcsAgentSNAssocProd:
    DependsOn: EcsAgentSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsAgentResourceConfig.Id
      PrivateDnsEnabled: true

  EcsTelemetryResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: ecs-telemetry-endpoint-rc
      CustomDomainName: !Sub ecs-telemetry.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref EcsTelemetryVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: ecs-telemetry-endpoint-rc

  EcsTelemetrySNAssocDev:
    DependsOn: EcsAgentSNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsTelemetryResourceConfig.Id
      PrivateDnsEnabled: true
  EcsTelemetrySNAssocTest:
    DependsOn: EcsTelemetrySNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsTelemetryResourceConfig.Id
      PrivateDnsEnabled: true
  EcsTelemetrySNAssocProd:
    DependsOn: EcsTelemetrySNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt EcsTelemetryResourceConfig.Id
      PrivateDnsEnabled: true

  ExecuteApiResourceConfig:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: execute-api-endpoint-rc
      CustomDomainName: !Sub execute-api.${AWS::Region}.amazonaws.com
      ResourceConfigurationType: SINGLE
      ResourceGatewayId: !GetAtt EndpointResourceGateway.Id
      PortRanges:
        - '443'
      ProtocolType: TCP
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !Ref ExecuteApiVpceDns
          IpAddressType: IPV4
      Tags:
        - Key: Name
          Value: execute-api-endpoint-rc

  ExecuteApiSNAssocDev:
    DependsOn: EcsTelemetrySNAssocProd
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt DevServiceNetwork.Id
      ResourceConfigurationId: !GetAtt ExecuteApiResourceConfig.Id
      PrivateDnsEnabled: true
  ExecuteApiSNAssocTest:
    DependsOn: ExecuteApiSNAssocDev
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt TestServiceNetwork.Id
      ResourceConfigurationId: !GetAtt ExecuteApiResourceConfig.Id
      PrivateDnsEnabled: true
  ExecuteApiSNAssocProd:
    DependsOn: ExecuteApiSNAssocTest
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !GetAtt ProdServiceNetwork.Id
      ResourceConfigurationId: !GetAtt ExecuteApiResourceConfig.Id
      PrivateDnsEnabled: true

Outputs:
  DevServiceNetworkId:
    Description: Dev Service Network ID
    Value: !GetAtt DevServiceNetwork.Id
  DevServiceNetworkArn:
    Description: Dev Service Network ARN
    Value: !Ref DevServiceNetwork
  TestServiceNetworkId:
    Description: Test Service Network ID
    Value: !GetAtt TestServiceNetwork.Id
  TestServiceNetworkArn:
    Description: Test Service Network ARN
    Value: !Ref TestServiceNetwork
  ProdServiceNetworkId:
    Description: Prod Service Network ID
    Value: !GetAtt ProdServiceNetwork.Id
  ProdServiceNetworkArn:
    Description: Prod Service Network ARN
    Value: !Ref ProdServiceNetwork
  EndpointResourceGatewayId:
    Description: Endpoint Resource Gateway ID
    Value: !GetAtt EndpointResourceGateway.Id
  SsmVpceDns:
    Description: SSM VPC Endpoint DNS name resolved by Lambda
    Value: !Ref SsmVpceDns
  StsVpceDns:
    Description: STS VPC Endpoint DNS name resolved by Lambda
    Value: !Ref StsVpceDns

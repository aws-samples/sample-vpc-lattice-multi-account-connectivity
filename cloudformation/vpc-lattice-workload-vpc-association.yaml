AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Associates a workload VPC with its RAM-shared VPC Lattice Service Network,
  with private DNS enabled for all domains. Designed for deployment as a
  service-managed CloudFormation StackSet targeting a workload OU, so every
  current and future account in the OU is associated automatically.

  No Lambda or custom resource is involved: the workload VPC ID is resolved
  natively from an SSM parameter, and the service network ID (identical for
  every account in the OU because it is a single RAM-shared resource) is passed
  as a parameter. The template also creates a workload security group that
  permits egress to the VPC Lattice managed prefix list, so traffic to the
  shared endpoints (443) and the egress proxy (3128) is not dropped.

Parameters:
  WorkloadVpcId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Default: /netfabric/workload/dev-vpc/id
    Description: >
      SSM parameter path that holds the workload VPC ID in each target account.
      CloudFormation resolves this to the VPC ID at deploy time (no Lambda).

  ServiceNetworkId:
    Type: String
    AllowedPattern: '^sn-[0-9a-z]{17}$'
    Description: >
      The RAM-shared VPC Lattice Service Network ID for this environment
      (e.g. the dev service network). The same ID is valid in every account
      in the target OU.

  ServiceNetworkName:
    Type: String
    Default: sn-dev-shared
    Description: Service network name, used only for the association Name tag.

  LatticePrefixListId:
    Type: String
    AllowedPattern: '^pl-[a-z0-9]+$'
    Description: >
      VPC Lattice managed prefix list ID for this Region
      (com.amazonaws.<region>.vpc-lattice). The workload security group allows
      egress to this prefix list on 443 and 3128.

Resources:
  # Workload security group: allows the workload VPC to send traffic INTO the
  # VPC Lattice data plane (the managed prefix list) on 443 (shared endpoints)
  # and 3128 (egress proxy). Without this egress, traffic to Lattice-managed IPs
  # is dropped and connections time out. Attach it to workload ENIs that use the
  # fabric. Mirrors the CDK WorkloadAssociationStackSetStack template.
  WorkloadLatticeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Lattice workload access - ${AWS::StackName}'
      VpcId: !Ref WorkloadVpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationPrefixListId: !Ref LatticePrefixListId
          Description: HTTPS to VPC Lattice (shared endpoints)
        - IpProtocol: tcp
          FromPort: 3128
          ToPort: 3128
          DestinationPrefixListId: !Ref LatticePrefixListId
          Description: Proxy to VPC Lattice (centralized egress)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-lattice-sg'

  VpcAssociation:
    Type: AWS::VpcLattice::ServiceNetworkVpcAssociation
    Properties:
      ServiceNetworkIdentifier: !Ref ServiceNetworkId
      VpcIdentifier: !Ref WorkloadVpcId
      PrivateDnsEnabled: true
      DnsOptions:
        PrivateDnsPreference: ALL_DOMAINS
      Tags:
        - Key: Name
          Value: !Sub 'lattice-vpc-assoc-${ServiceNetworkName}'

Outputs:
  VpcAssociationId:
    Description: VPC Lattice Service Network VPC Association ID
    Value: !GetAtt VpcAssociation.Id
  ResolvedVpcId:
    Description: Workload VPC ID resolved from SSM
    Value: !Ref WorkloadVpcId
  ServiceNetworkId:
    Description: Service Network ID the VPC was associated with
    Value: !Ref ServiceNetworkId
  WorkloadLatticeSecurityGroupId:
    Description: Security group permitting workload egress to the VPC Lattice prefix list
    Value: !Ref WorkloadLatticeSecurityGroup

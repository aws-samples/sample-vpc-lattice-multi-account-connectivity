AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Workload account foundation for the VPC Lattice reference architecture.
  Creates a dedicated, fully ISOLATED workload VPC spanning three Availability
  Zones (no internet gateway, no NAT gateway, no public subnets) and publishes
  the VPC and subnet identifiers to SSM under /netfabric/workload/. All
  connectivity (AWS service access and filtered internet egress) is delivered
  through the VPC Lattice service network association, not per-account
  networking. The workload association template
  (vpc-lattice-workload-vpc-association.yaml) reads the VPC ID from SSM at
  deploy time, which is what makes service-managed StackSet rollout work
  without a Lambda.

  CloudFormation equivalent of the CDK WorkloadFoundationStack. Deploy this
  per workload account before applying the workload association template.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: VPC sizing
        Parameters:
          - VpcCidr
      - Label:
          default: Environment and naming
        Parameters:
          - Environment
          - VpcSsmPath

Parameters:
  VpcCidr:
    Type: String
    Default: 10.7.0.0/16
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    Description: IPv4 CIDR block for the workload VPC. Must not overlap with the Network account Endpoint or Egress VPC CIDRs.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test, stage, prod]
    Description: Environment name used in resource Name tags and SSM paths. Must match the workload OU environment.

  VpcSsmPath:
    Type: String
    Default: /netfabric/workload/dev-vpc/id
    AllowedPattern: '^/[a-zA-Z0-9/_.-]+[^/]$'
    Description: SSM parameter path the VPC ID is published under. The workload association template defaults to /netfabric/workload/dev-vpc/id.

Resources:
  # ============================================================
  # KMS key for CloudWatch Logs encryption at rest (flow logs)
  # ============================================================
  LogsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK for Network fabric workload-account CloudWatch log groups
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAdmin
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                'kms:EncryptionContext:aws:logs:arn': !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'

  # ============================================================
  # Workload VPC: 3 AZs, fully isolated (no IGW / NAT / public), flow logs.
  # Connectivity is delivered only through the VPC Lattice association.
  # ============================================================
  WorkloadVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'netfabric-workload-${Environment}-vpc'

  WorkloadVpcFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/netfabric/workload/${Environment}-vpc/flow-logs/${AWS::StackName}'
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogsKmsKey.Arn

  WorkloadVpcFlowLogManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allows the workload VPC flow-log role to publish to its log group
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: !GetAtt WorkloadVpcFlowLogGroup.Arn

  WorkloadVpcFlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref WorkloadVpcFlowLogManagedPolicy

  WorkloadVpcFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceType: VPC
      ResourceId: !Ref WorkloadVpc
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref WorkloadVpcFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt WorkloadVpcFlowLogRole.Arn

  # Isolated application subnets (no route to an IGW or NAT gateway).
  WorkloadAppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WorkloadVpc
      AvailabilityZone: !Sub ${AWS::Region}a
      CidrBlock: !Select [0, !Cidr [!GetAtt WorkloadVpc.CidrBlock, 3, 8]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'netfabric-workload-${Environment}-vpc/appSubnetA'

  WorkloadAppSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WorkloadVpc
      AvailabilityZone: !Sub ${AWS::Region}b
      CidrBlock: !Select [1, !Cidr [!GetAtt WorkloadVpc.CidrBlock, 3, 8]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'netfabric-workload-${Environment}-vpc/appSubnetB'

  WorkloadAppSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WorkloadVpc
      AvailabilityZone: !Sub ${AWS::Region}c
      CidrBlock: !Select [2, !Cidr [!GetAtt WorkloadVpc.CidrBlock, 3, 8]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'netfabric-workload-${Environment}-vpc/appSubnetC'

  # Isolated route table: intra-VPC routing only, no default route.
  WorkloadAppRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WorkloadVpc
      Tags:
        - Key: Name
          Value: !Sub 'netfabric-workload-${Environment}-vpc/appRouteTable'

  WorkloadAppSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WorkloadAppSubnetA
      RouteTableId: !Ref WorkloadAppRouteTable
  WorkloadAppSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WorkloadAppSubnetB
      RouteTableId: !Ref WorkloadAppRouteTable
  WorkloadAppSubnetCRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WorkloadAppSubnetC
      RouteTableId: !Ref WorkloadAppRouteTable

  # ============================================================
  # SSM parameter contract: every identifier the workload association template consumes
  # ============================================================
  WorkloadVpcIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Ref VpcSsmPath
      Type: String
      Value: !Ref WorkloadVpc
      Description: !Sub 'Network fabric Workload ${Environment} VPC ID'

  WorkloadVpcCidrParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/netfabric/workload/${Environment}-vpc/cidr'
      Type: String
      Value: !GetAtt WorkloadVpc.CidrBlock
      Description: !Sub 'Network fabric Workload ${Environment} VPC CIDR'

  WorkloadAppSubnetAIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/netfabric/workload/${Environment}-vpc/subnet/a/id'
      Type: String
      Value: !Ref WorkloadAppSubnetA
      Description: !Sub 'Network fabric Workload ${Environment} VPC app subnet a'
  WorkloadAppSubnetBIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/netfabric/workload/${Environment}-vpc/subnet/b/id'
      Type: String
      Value: !Ref WorkloadAppSubnetB
      Description: !Sub 'Network fabric Workload ${Environment} VPC app subnet b'
  WorkloadAppSubnetCIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/netfabric/workload/${Environment}-vpc/subnet/c/id'
      Type: String
      Value: !Ref WorkloadAppSubnetC
      Description: !Sub 'Network fabric Workload ${Environment} VPC app subnet c'

Outputs:
  WorkloadVpcId:
    Description: Workload VPC ID
    Value: !Ref WorkloadVpc
  WorkloadAppSubnetIds:
    Description: Comma-separated Workload VPC isolated app subnet IDs (a,b,c)
    Value: !Sub ${WorkloadAppSubnetA},${WorkloadAppSubnetB},${WorkloadAppSubnetC}

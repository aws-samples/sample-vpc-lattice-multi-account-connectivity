AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Builds the custom Squid proxy container image with CodeBuild and pushes it to
  ECR. The build context (Dockerfile, squid.conf, allowlist.txt, entrypoint.sh)
  is embedded inline via the buildspec. After a successful build the image URI is
  published to SSM so the squid-egress-proxy stack can resolve it at deploy time.

  Deploy this stack first, trigger the build, wait for success, then deploy
  squid-egress-proxy.yaml. CloudFormation equivalent of the CDK SquidImageBuildStack.

Parameters:
  SsmPrefix:
    Type: String
    Default: /netfabric
    AllowedPattern: '^/[a-zA-Z0-9/_.-]+[^/]$'
    Description: SSM namespace prefix. The image URI is published at <prefix>/egress/squid-image-uri.

  AllowedDomains:
    Type: String
    Default: '.amazonaws.com .aws.amazon.com .amazonlinux.com'
    Description: Space-separated list of domains for the Squid allowlist (prefix with . for subdomains).

Resources:

  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub
        - '${Prefix}-squid-proxy'
        - Prefix: !Select [1, !Split ['/', !Ref SsmPrefix]]
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }

  BuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub
        - '/aws/codebuild/${Prefix}-squid-proxy-build'
        - Prefix: !Select [1, !Split ['/', !Ref SsmPrefix]]
      RetentionInDays: 30
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SquidBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !GetAtt EcrRepository.Arn
              - Sid: SSMPut
                Effect: Allow
                Action: ssm:PutParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmPrefix}/egress/squid-image-uri'
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt BuildLogGroup.Arn

  SquidBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub
        - '${Prefix}-squid-proxy-build'
        - Prefix: !Select [1, !Split ['/', !Ref SsmPrefix]]
      Description: Builds the Squid proxy image and pushes to ECR
      TimeoutInMinutes: 15
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REPO_URI
            Value: !GetAtt EcrRepository.RepositoryUri
          - Name: AWS_ACCOUNT_ID
            Value: !Ref 'AWS::AccountId'
          - Name: IMAGE_URI_SSM_PATH
            Value: !Sub '${SsmPrefix}/egress/squid-image-uri'
          - Name: ALLOWED_DOMAINS
            Value: !Ref AllowedDomains
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - IMAGE_TAG=$(date +%Y%m%d-%H%M%S)
            build:
              commands:
                - mkdir -p build
                - echo "" | base64 -d > build/Dockerfile
                - echo "" | base64 -d > build/entrypoint.sh
                - echo "" | base64 -d > build/squid.conf
                - printf '%s\n' $ALLOWED_DOMAINS > build/allowlist.txt
                - echo Building the Squid image...
                - docker build -t $ECR_REPO_URI:$IMAGE_TAG build/
            post_build:
              commands:
                - echo Pushing the image...
                - docker push $ECR_REPO_URI:$IMAGE_TAG
                - echo Writing image URI to SSM...
                - aws ssm put-parameter --name $IMAGE_URI_SSM_PATH --type String --overwrite --value $ECR_REPO_URI:$IMAGE_TAG
                - echo "Done - $ECR_REPO_URI:$IMAGE_TAG"
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          GroupName: !Ref BuildLogGroup
          Status: ENABLED

  ImageUriParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '${SsmPrefix}/egress/squid-image-uri'
      Type: String
      Value: !Sub '${EcrRepository.RepositoryUri}:bootstrap'
      Description: Squid proxy image URI (updated by CodeBuild after successful build)

Outputs:
  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
    Description: ECR repository URI for the Squid proxy image

  CodeBuildProjectName:
    Value: !Ref SquidBuildProject
    Description: CodeBuild project name. Trigger with - aws codebuild start-build --project-name <this-value>

  BuildCommand:
    Value: !Sub
      - 'aws codebuild start-build --project-name ${Project} --region ${AWS::Region}'
      - Project: !Ref SquidBuildProject
    Description: CLI command to trigger the image build

  ImageUriSsmPath:
    Value: !Sub '${SsmPrefix}/egress/squid-image-uri'
    Description: SSM parameter path where the built image URI is stored

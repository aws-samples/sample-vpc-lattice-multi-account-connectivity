AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Phase 5 ingress PRODUCER (Workload account). Demonstrates a workload account
  exposing an internal application to the shared VPC Lattice fabric so external,
  on-premises, and cross-Region consumers can reach it through the Service
  Network VPC Endpoint (SN-E), with no proxy fleet. It deploys a minimal app (an
  SSM-managed EC2 serving HTTP on port 80) behind an internal Network Load
  Balancer, a workload Resource Gateway, and a Resource Configuration (SINGLE,
  targeting the NLB) associated to the shared service network. The RC carries
  the PublishIngressDns tag so the ingress DNS automation publishes its custom
  domain. The Service Network IAM auth policy still governs access. Kept at
  parity with cdk/lib/workload-app-stack.ts.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Naming
        Parameters:
          - ResourcePrefix
      - Label:
          default: Workload VPC (from SSM)
        Parameters:
          - WorkloadVpcId
          - WorkloadSubnetAId
          - WorkloadSubnetBId
          - WorkloadSubnetCId
          - WorkloadVpcCidr
      - Label:
          default: VPC Lattice
        Parameters:
          - ServiceNetworkId
          - LatticePrefixListId
          - CustomDomainName
      - Label:
          default: Instance
        Parameters:
          - LatestAl2023Ami

Parameters:
  ResourcePrefix:
    Type: String
    Default: netfabric
    AllowedPattern: '^[a-z][a-z0-9-]{1,30}[a-z0-9]$'
    Description: Single token that namespaces every resource name created by this stack.

  WorkloadVpcId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Default: /netfabric/workload/dev-vpc/id
    Description: SSM path resolving to the workload VPC ID.

  WorkloadSubnetAId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/workload/dev-vpc/subnet/a/id
    Description: SSM path resolving to workload subnet a.

  WorkloadSubnetBId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/workload/dev-vpc/subnet/b/id
    Description: SSM path resolving to workload subnet b.

  WorkloadSubnetCId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Default: /netfabric/workload/dev-vpc/subnet/c/id
    Description: SSM path resolving to workload subnet c.

  WorkloadVpcCidr:
    Type: String
    Default: 10.7.0.0/16
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    Description: Workload VPC CIDR (scopes in-VPC HTTP access to the app).

  ServiceNetworkId:
    Type: String
    AllowedPattern: '^sn-[0-9a-z]{17}$'
    Description: Dev service network ID to associate the app Resource Configuration to (RAM-shared to the workload OU).

  LatticePrefixListId:
    Type: String
    AllowedPattern: '^pl-[0-9a-f]{8,17}$'
    Description: VPC Lattice managed prefix list ID (scopes the Resource Gateway SG to the Lattice data plane).

  CustomDomainName:
    Type: String
    Default: app.ingress.internal
    Description: Consumer-facing ingress custom domain for the app (also the PublishIngressDns tag value).

  LatestAl2023Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI (resolved from the public SSM parameter).

Resources:
  AppSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Workload ingress demo app - HTTP 80 from within the VPC - ${AWS::StackName}'
      VpcId: !Ref WorkloadVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref WorkloadVpcCidr
          Description: HTTP from within the workload VPC (NLB-to-target and Resource Gateway path)
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-workload-app-sg'

  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppRole

  App:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAl2023Ami
      InstanceType: t3.micro
      IamInstanceProfile: !Ref AppInstanceProfile
      SubnetId: !Ref WorkloadSubnetAId
      SecurityGroupIds:
        - !Ref AppSg
      Monitoring: false
      MetadataOptions:
        HttpTokens: required
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            Encrypted: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          mkdir -p /opt/app && cd /opt/app
          echo "ingress-demo OK from workload account $(hostname)" > index.html
          nohup python3 -m http.server 80 >>/var/log/ingress-app.log 2>&1 &
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-workload-app'
        - Key: Environment
          Value: !Select [0, !Split ['.', !Ref CustomDomainName]]

  AppNlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: network
      Scheme: internal
      Subnets:
        - !Ref WorkloadSubnetAId
        - !Ref WorkloadSubnetBId
        - !Ref WorkloadSubnetCId
      LoadBalancerAttributes:
        - Key: load_balancing.cross_zone.enabled
          Value: 'true'

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref WorkloadVpcId
      Port: 80
      Protocol: TCP
      TargetType: instance
      HealthCheckProtocol: TCP
      HealthCheckPort: '80'
      Targets:
        - Id: !Ref App
          Port: 80

  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppNlb
      Port: 80
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  AppRgwSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Workload app Resource Gateway - HTTP 80 from the VPC Lattice data plane - ${AWS::StackName}'
      VpcId: !Ref WorkloadVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !Ref LatticePrefixListId
          Description: HTTP from the VPC Lattice data plane (managed prefix list)
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-workload-app-rgw-sg'

  AppResourceGateway:
    Type: AWS::VpcLattice::ResourceGateway
    Properties:
      Name: !Sub '${ResourcePrefix}-workload-app-rgw'
      VpcIdentifier: !Ref WorkloadVpcId
      SubnetIds:
        - !Ref WorkloadSubnetAId
        - !Ref WorkloadSubnetBId
        - !Ref WorkloadSubnetCId
      SecurityGroupIds:
        - !Ref AppRgwSg

  AppResourceConfiguration:
    Type: AWS::VpcLattice::ResourceConfiguration
    Properties:
      Name: !Sub '${ResourcePrefix}-workload-app-rc'
      ResourceConfigurationType: SINGLE
      AllowAssociationToSharableServiceNetwork: true
      ResourceGatewayId: !GetAtt AppResourceGateway.Id
      CustomDomainName: !Ref CustomDomainName
      ProtocolType: TCP
      PortRanges:
        - '80'
      ResourceConfigurationDefinition:
        DnsResource:
          DomainName: !GetAtt AppNlb.DNSName
          IpAddressType: IPV4
      Tags:
        - Key: PublishIngressDns
          Value: !Ref CustomDomainName

  AppRcAssociation:
    Type: AWS::VpcLattice::ServiceNetworkResourceAssociation
    Properties:
      ServiceNetworkId: !Ref ServiceNetworkId
      ResourceConfigurationId: !GetAtt AppResourceConfiguration.Id
      PrivateDnsEnabled: true

Outputs:
  AppInstanceId:
    Description: Workload demo app instance ID.
    Value: !Ref App
  AppNlbDns:
    Description: Internal NLB DNS name fronting the app.
    Value: !GetAtt AppNlb.DNSName
  AppResourceConfigurationId:
    Description: Resource Configuration ID surfaced through the SN-E.
    Value: !GetAtt AppResourceConfiguration.Id
